<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Control Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1722 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px; color: white;
        }
        .container {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 600px; text-align: center;
        }
        .section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .counter-value {
            font-size: 5rem; font-weight: 800; font-family: monospace;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .label { font-size: 0.8rem; color: #8a9fb1; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        /* Стили для управления моторами */
        .motor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; }
        .motor-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .motor-title { font-weight: bold; margin-bottom: 15px; display: block; color: #FFB347; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn {
            border: none; border-radius: 12px; cursor: pointer; color: white;
            font-weight: bold; transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        
        /* Круглые кнопки для счетчика */
        .btn-round { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 50%; }
        /* Кнопки для моторов */
        .btn-small { padding: 10px 15px; flex: 1; font-size: 0.9rem; }

        .btn-minus, .btn-ccw { background: #e74c3c; }
        .btn-plus, .btn-cw { background: #2ecc71; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animate { animation: pulse 0.15s ease-out; }
    </style>
</head>
<body>

    <div class="container">
        <div class="section">
            <div class="label">Счётчик (System Check)</div>
            <span class="counter-value" id="counter">0</span>
            <div class="btn-group" style="margin-top: 15px;">
                <button class="btn btn-round btn-minus" onclick="sendApiRequest('/api/minus')">−</button>
                <button class="btn btn-round btn-plus" onclick="sendApiRequest('/api/plus')">+</button>
            </div>
        </div>

        <div class="label">Управление шаговыми двигателями</div>
        <div class="motor-grid">
            <div class="motor-card">
                <span class="motor-title">Мотор 1</span>
                <div class="btn-group">
                    <button class="btn btn-small btn-ccw" onclick="moveMotor(1, 100, 'ccw')">← 100</button>
                    <button class="btn btn-small btn-cw" onclick="moveMotor(1, 100, 'cw')">100 →</button>
                </div>
            </div>
            <div class="motor-card">
                <span class="motor-title">Мотор 2</span>
                <div class="btn-group">
                    <button class="btn btn-small btn-ccw" onclick="moveMotor(2, 500, 'ccw')">← 500</button>
                    <button class="btn btn-small btn-cw" onclick="moveMotor(2, 500, 'cw')">500 →</button>
                </div>
            </div>
            <div class="motor-card">
                <span class="motor-title">Мотор 3</span>
                <div class="btn-group">
                    <button class="btn btn-small btn-ccw" onclick="moveMotor(3, 1000, 'ccw')">← 1k</button>
                    <button class="btn btn-small btn-cw" onclick="moveMotor(3, 1000, 'cw')">1k →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const counterEl = document.getElementById('counter');

    function triggerAnimation() {
        counterEl.classList.remove('animate');
        void counterEl.offsetWidth;
        counterEl.classList.add('animate');
    }

    // Универсальная функция формирования URL для STM32
    // Используем '!', так как '?' обрезается сервером
    function buildUrl(path, params = {}) {
        const timestamp = Date.now();
        let url = `${path}!t=${timestamp}`;
        for (const [key, value] of Object.entries(params)) {
            url += `&${key}=${value}`;
        }
        return url;
    }

    // Общая функция для простых запросов (счетчик)
    async function sendApiRequest(path) {
        try {
            // Исправлено: формируем корректный путь с '!' вместо прямого склеивания с '&'
            const url = buildUrl(path); 
            const response = await fetch(url);
            
            if (!response.ok) return;
            const data = await response.json();
            
            if (data && typeof data.value !== 'undefined') {
                counterEl.textContent = data.value;
                triggerAnimation();
            }
        } catch (e) { console.error("Counter API Error:", e); }
    }

    // Функция для управления моторами
    async function moveMotor(motorId, steps, direction) {
        // Формируем URL: /api/move!t=123&m=1&s=100&d=cw
        const url = buildUrl('/api/move', {
            m: motorId,
            s: steps,
            d: direction
        });

        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                console.log(`Команда принята: мотор ${motorId}`, data);
            } else {
                console.error("Server returned error:", response.status);
            }
        } catch (e) { console.error("Motor API Error:", e); }
    }

    // Первоначальная загрузка
    window.addEventListener('DOMContentLoaded', () => sendApiRequest('/api/value'));
    // Опрос счетчика раз в 5 сек
    setInterval(() => sendApiRequest('/api/value'), 5000);
</script>
</body>
</html>
